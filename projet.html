<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurant Délice | Luxe & Saveurs</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            :root{
                --primary: #ffcc00;
                --dark: #0a0a0a;
                --glass: rgba(255, 255, 255, 0.1);
            }
            body{
                margin: 0;
                font-family: 'Poppins', sans-serif;
                background-color: var(--dark);
                color: white;
                overflow-x: hidden;
            }
            nav{
                position: fixed;
                top: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(10px);
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 5%;
                box-sizing: border-box;
                z-index: 2000;
                border-bottom: 1px solid rgba(255,204,0,0.3);
            }
            section {
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                scroll-snap-align: start;
                padding: 80px 20px;
                box-sizing: border-box;
                position: relative;
            }
            .logo{
                 font-size: 1.5rem; 
                 font-weight: bold; 
                 color: var(--primary); 
            }     
            .nav-links{ 
                display: flex; 
                list-style: none; 
                gap: 20px; 
            }
            .nav-links a{
                color: white;
                text-decoration: none;
                font-size: 0.9rem;
                text-transform: uppercase;
                transition: 0.3s;
            }
            .nav-links a:hover{
                color : var(--primary)
            }
            .burger{
                 display: none; 
                 cursor: pointer; 
                 font-size: 1.5rem; 
            }
            #home{
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=1600') center/cover;
            }
            #menu{
                padding: 80px 20px;
                text-align: center;
                background: #111;
            }
            .slider-container{
                display: flex;
                overflow-x: auto;
                gap: 20px;
                width: 90%;
                padding: 20px;
                scroll-behavior: smooth;
            }
            .slider-container::-webkit-scrollbar{
                 display: none;
            }
            .card{
                min-width: 280px;
                background: var(--glass);
                border-radius: 20px;
                padding: 15px;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.1);
                transition: 0.4s;
            }
            .card img{
                width: 100%;
                border-radius: 15px;
                height: 180px;
                object-fit: cover;
            }
            .dec-menu{
                background: var(--primary);
                color: black;
                border: none;
                cursor: pointer;
                transition: 0.3s;
               
            }
            .dec-menu:hover{
                background-color: var(--dark);
                color : var(--primary);
            }
            
            .gal {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
                width: 80%;
            }
            .gal img {
                width: 100%;
                height: 150px;
                object-fit: cover;
                border-radius: 10px;
                cursor: pointer;
                filter: grayscale(0.3);
                transition: 0.3s;
            }
            .gal img:hover {
                filter: grayscale(0);
                transform: scale(1.1);
        </style>
    </head>
    <body>
        <nav>
            <div class="logo">DÉLICE <span style="color:white">RESTAURANT</span></div>
            <ul class="nav-links">
                <li><a href="#home">Accueil</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#gallery">Galerie</a></li>
                <li><a href="#reviews">Avis</a></li>
                <li><a href="#reservation">Réserver</a></li>
            </ul>
            <div class="burger"><i class="fas fa-bars"></i></div>
        </nav>

        <section id="home">
            <h1 style="font-size: 4.5rem; margin:0">Restau Mohamed</h1>
            <p style="letter-spacing: 5px; color: var(--primary)">UNE EXPÉRIENCE INOUBLIABLE</p>
            <button class="dec-menu" style="width: auto; padding: 15px 40px; margin-top: 20px;"
                onclick="window.location.href='#menu'">DÉCOUVRIR LE MENU</button>
        </section>
        <section id="menu">
            <h2 style="color: var(--primary)">Notre Carte</h2>
            <div class="slider-container" id="menuSlider">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza">
                    <h3>Pizza Truffe</h3>
                    <p>95 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Burger">
                    <h3>Burger Signature</h3>
                    <p>75 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" alt="Salade">
                    <h3>Bowl Fraîcheur</h3>
                    <p>65 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400" alt="Poisson">
                    <h3>Saumon Grillé</h3>
                    <p>120 DH</p>
                </div>
            </div>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">Glissez pour voir plus →</p>
        </section>
        <section id="gallery">
            <h2>L'Ambiance de notre Restaurant</h2>
            <div class="gal">
                <img src="https://imgs.search.brave.com/grQFkbre7gljyK8wBhA_5hYBuRL0bqBHh049Vx-p8bc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pbWcu/bGFjYXJ0ZS5tZW51/L3N0b3JhZ2UvbWVk/aWEvY29tcGFueV9p/bWFnZXMvMzQ4NTY4/NzYvY29udmVyc2lv/bnMvdGh1bWJuYWls/LmpwZw" alt="restaurant">
                <img src="https://imgs.search.brave.com/G7WF8m3oZ1SYJ6d1IePezjrsnr2UFh1LK4io-VHjLkg/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9saDMu/Z29vZ2xldXNlcmNv/bnRlbnQuY29tL3Av/QUYxUWlwT3U2S0lI/b3I2Tm5sVmJZcTQ4/dFZMeEF5dzZpVEZ1/OFJ2VWxKb2M9czE2/MDAtdzY0MA" alt="restaurant">
                <img src="https://imgs.search.brave.com/YGGguMuEIpfKVcPVugCfJNLDwTF2R_MvbzIWLHZ5ttQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9saDMu/Z29vZ2xldXNlcmNv/bnRlbnQuY29tL3Av/QUYxUWlwT3FpT0hL/Z19rZ0wwUzBIaTNY/TzBrekZCWHRTdjFQ/RkVxX3dNNWY9czE2/MDAtdzY0MA" alt="restaurant">
                <img src="https://imgs.search.brave.com/YGGguMuEIpfKVcPVugCfJNLDwTF2R_MvbzIWLHZ5ttQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9saDMu/Z29vZ2xldXNlcmNv/bnRlbnQuY29tL3Av/QUYxUWlwT3FpT0hL/Z19rZ0wwUzBIaTNY/TzBrekZCWHRTdjFQ/RkVxX3dNNWY9czE2/MDAtdzY0MA" alt="restaurant">
            </div>
        </section>
    </body>
</html>
