<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurant Délice | Luxe & Saveurs</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    </head>
    <body>
        <nav>
            <div class="logo">DÉLICE <span style="color:white">RESTAURANT</span></div>
            <ul class="nav-links">
                <li><a href="#home">Accueil</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#gallery">Galerie</a></li>
                <li><a href="#reviews">Avis</a></li>
                <li><a href="#reservation">Réserver</a></li>
            </ul>
            <div class="burger"><i class="fas fa-bars"></i></div>
        </nav>

        <section id="home">
            <h1 style="font-size: 4.5rem; margin:0">Restau Mohamed</h1>
            <p style="letter-spacing: 5px; color: var(--primary)">UNE EXPÉRIENCE INOUBLIABLE</p>
            <button class="btn-gold" style="width: auto; padding: 15px 40px; margin-top: 20px;"
                onclick="window.location.href='#menu'">DÉCOUVRIR LE MENU</button>
        </section>

        <section id="menu">
            <h2 style="color: var(--primary)">Notre Carte</h2>
            <div class="slider-container" id="menuSlider">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza">
                    <h3>Pizza Truffe</h3>
                    <p>95 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Burger">
                    <h3>Burger Signature</h3>
                    <p>75 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" alt="Salade">
                    <h3>Bowl Fraîcheur</h3>
                    <p>65 DH</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400" alt="Poisson">
                    <h3>Saumon Grillé</h3>
                    <p>120 DH</p>
                </div>
            </div>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">Glissez pour voir plus →</p>
        </section>

    </body>

</html>
